# =============================================================================
# NorthRiver Banking Agent — Google Cloud Build CI/CD pipeline
#
# Triggered automatically on every push to the `main` branch.
#
# Pipeline stages:
#   1. build   — Docker multi-stage build (React frontend + Python backend)
#   2. push    — Push image to Artifact Registry
#   3. deploy  — Rolling deploy to Cloud Run (zero-downtime)
#   4. verify  — Confirm the service URL responds with HTTP 200
#
# Set up the trigger once:
#   gcloud builds triggers create github \
#     --repo-name=<your-repo> \
#     --repo-owner=<your-github-org> \
#     --branch-pattern="^main$" \
#     --build-config=cloudbuild.yaml \
#     --project=$GOOGLE_CLOUD_PROJECT
#
# Required Cloud Build service-account IAM roles:
#   roles/run.admin
#   roles/iam.serviceAccountUser
#   roles/artifactregistry.writer
# =============================================================================

steps:

  # ---------------------------------------------------------------------------
  # 1. BUILD — multi-stage Docker image
  #    Stage 1 (Node 20):   npm ci && vite build  →  frontend/dist/
  #    Stage 2 (Python 3.12): pip install + copy backend + dist
  # ---------------------------------------------------------------------------
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}
      - --tag=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest
      - --cache-from=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest
      - --build-arg=BUILDKIT_INLINE_CACHE=1
      - .
    env:
      - DOCKER_BUILDKIT=1

  # ---------------------------------------------------------------------------
  # 2. PUSH — both the commit-SHA tag and :latest
  # ---------------------------------------------------------------------------
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}
    waitFor:
      - build

  # ---------------------------------------------------------------------------
  # 3. DEPLOY — rolling update to Cloud Run
  #    Uses the immutable :SHORT_SHA image so every deploy is reproducible.
  #    DEMO_CREDENTIALS is supplied from a Cloud Build substitution so the
  #    secret never lives in source control — set it in the trigger config
  #    or override at build time with --substitutions.
  # ---------------------------------------------------------------------------
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}
      - --region=${_REGION}
      - --project=${PROJECT_ID}
      - --allow-unauthenticated
      - --min-instances=${_MIN_INSTANCES}
      - --max-instances=10
      - --memory=1Gi
      - --cpu=1
      - --concurrency=10
      - --timeout=3600
      # ^|^ delimiter keeps commas inside DEMO_CREDENTIALS safe
      - --set-env-vars=^|^GOOGLE_GENAI_USE_VERTEXAI=TRUE|GOOGLE_CLOUD_PROJECT=${PROJECT_ID}|GOOGLE_CLOUD_LOCATION=${_AI_LOCATION}|AGENT_MODEL=${_AGENT_MODEL}|FIRESTORE_PROJECT=${PROJECT_ID}|DEMO_CREDENTIALS=${_DEMO_CREDENTIALS}
      - --quiet
    waitFor:
      - push

  # ---------------------------------------------------------------------------
  # 4. VERIFY — smoke-test: the service URL must return HTTP 200
  # ---------------------------------------------------------------------------
  - id: verify
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        SERVICE_URL=$(gcloud run services describe ${_SERVICE} \
          --region=${_REGION} --project=${PROJECT_ID} \
          --format="value(status.url)")
        echo "Service URL: $${SERVICE_URL}"
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$${SERVICE_URL}")
        echo "HTTP status: $${STATUS}"
        [[ "$${STATUS}" == "200" ]] || { echo "Smoke test FAILED (expected 200, got $${STATUS})"; exit 1; }
        echo "Smoke test PASSED"
    waitFor:
      - deploy

# ---------------------------------------------------------------------------
# Substitution defaults — override these in the Cloud Build trigger config
# or pass --substitutions on the CLI.
# ---------------------------------------------------------------------------
substitutions:
  _SERVICE: northriver-banking-agent
  _REGION: europe-west4
  _REPO: northriver-banking
  _AI_LOCATION: europe-west4
  _AGENT_MODEL: gemini-live-2.5-flash-native-audio
  _MIN_INSTANCES: "1"
  # Override _DEMO_CREDENTIALS in the trigger to avoid committing credentials.
  # Default provided here for convenience in dev builds only.
  _DEMO_CREDENTIALS: sophie:nova1234:acc_demo_01:user_demo_01,liam:nova1234:acc_demo_02:user_demo_02

# Push both tags to Artifact Registry
images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  dynamic_substitutions: true
  # Use a higher-tier machine for faster Docker builds
  machineType: E2_HIGHCPU_8
